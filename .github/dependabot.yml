version: 2
updates:
  # Keep runtime/dev npm dependencies patched (security + version drift).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"

  # Keep GitHub Actions pinned-SHAs updated (Dependabot bumps the SHA + version comment).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
